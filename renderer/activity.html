<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JARVIS — Activity</title>
    <style>
      :root {
        --bg: #0a0e14;
        --panel: #121824;
        --panel2: #0e131d;
        --line: #1e2839;
        --text: #dbe4f0;
        --dim: #7d8aa0;
        --accent: #4aa3ff;
        --ok: #35d07f;
        --warn: #ffb454;
        --err: #ff5c6c;
        --think: #b48cff;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        background: var(--bg);
        color: var(--text);
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }
      header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, var(--panel), var(--panel2));
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .dot {
        width: 12px; height: 12px; border-radius: 50%;
        background: var(--dim); flex: none;
        box-shadow: 0 0 0 0 rgba(74,163,255,0.5);
      }
      body[data-state='running'] .dot { background: var(--accent); animation: pulse 1.4s infinite; }
      body[data-state='done'] .dot { background: var(--ok); }
      body[data-state='error'] .dot { background: var(--err); }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(74,163,255,0.5); }
        70% { box-shadow: 0 0 0 10px rgba(74,163,255,0); }
        100% { box-shadow: 0 0 0 0 rgba(74,163,255,0); }
      }
      .htitle { font-weight: 600; font-size: 15px; letter-spacing: 0.3px; }
      #now { color: var(--dim); font-size: 12.5px; margin-left: auto; max-width: 55%; text-align: right;
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .main { display: flex; flex: 1; min-height: 0; }
      .tasks {
        width: 240px; flex: none; border-right: 1px solid var(--line);
        background: var(--panel2); overflow-y: auto; padding: 10px;
      }
      .tasks h2, .feedwrap h2 {
        font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
        color: var(--dim); margin: 4px 4px 10px;
      }
      .task {
        background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
        padding: 8px 10px; margin-bottom: 8px;
      }
      .task .t-name { font-weight: 600; font-size: 12.5px; }
      .task .t-meta { color: var(--dim); font-size: 11px; margin-top: 3px; }
      .task.active { border-color: var(--accent); }
      .task .bar { height: 3px; background: var(--line); border-radius: 2px; margin-top: 7px; overflow: hidden; }
      .task .bar > i { display: block; height: 100%; background: var(--accent); width: 0; transition: width .3s; }
      .empty { color: var(--dim); font-size: 12px; padding: 6px; }
      .feedwrap { flex: 1; display: flex; flex-direction: column; min-width: 0; }
      .feedbar {
        display: flex; align-items: center; gap: 10px; padding: 8px 14px;
        border-bottom: 1px solid var(--line);
      }
      .feedbar h2 { margin: 0; }
      .feedbar .spacer { flex: 1; }
      .feedbar button, .feedbar label {
        background: var(--panel); color: var(--text); border: 1px solid var(--line);
        border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer;
      }
      .feedbar label { display: inline-flex; align-items: center; gap: 5px; }
      #feed { flex: 1; overflow-y: auto; padding: 8px 0; }
      .row {
        display: grid; grid-template-columns: 60px 22px 1fr; gap: 8px;
        padding: 4px 16px; align-items: baseline;
      }
      .row:hover { background: rgba(255,255,255,0.02); }
      .row .time { color: var(--dim); font-variant-numeric: tabular-nums; font-size: 11px; }
      .row .ico { text-align: center; }
      .row .txt { white-space: pre-wrap; word-break: break-word; }
      .row.action .txt { color: var(--text); }
      .row.think .txt { color: var(--think); }
      .row.step .txt { color: var(--accent); font-weight: 600; }
      .row.done .txt { color: var(--ok); }
      .row.error .txt { color: var(--err); }
      .row.started { border-top: 1px solid var(--line); margin-top: 4px; padding-top: 8px; }
      .row.started .txt { font-weight: 700; }
      .tag { font-size: 10px; color: var(--dim); border: 1px solid var(--line); border-radius: 4px; padding: 0 5px; margin-left: 6px; }
    </style>
  </head>
  <body data-state="idle">
    <header>
      <span class="dot"></span>
      <span class="htitle">JARVIS Activity</span>
      <span id="now">Idle</span>
    </header>
    <div class="main">
      <aside class="tasks">
        <h2>Running now</h2>
        <div id="tasklist"><div class="empty">Nothing running.</div></div>
      </aside>
      <section class="feedwrap">
        <div class="feedbar">
          <h2>Live timeline</h2>
          <span class="spacer"></span>
          <label><input type="checkbox" id="autoscroll" checked /> Auto-scroll</label>
          <button id="clear">Clear</button>
        </div>
        <div id="feed"></div>
      </section>
    </div>
    <script src="activity.js"></script>
  </body>
</html>
