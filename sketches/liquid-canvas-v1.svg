<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1a2233" opacity="0.55"/>
    </pattern>

    <radialGradient id="tintBlue" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#7da3ff" stop-opacity="0.10"/>
      <stop offset="70%" stop-color="#7da3ff" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#7da3ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tintGreen" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.09"/>
      <stop offset="70%" stop-color="#4ade80" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <radialGradient id="fog">
      <stop offset="0%" stop-color="#8b95a7" stop-opacity="0.32"/>
      <stop offset="80%" stop-color="#8b95a7" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#8b95a7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="aiProbe">
      <stop offset="0%" stop-color="#7da3ff" stop-opacity="0.0"/>
      <stop offset="70%" stop-color="#7da3ff" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#7da3ff" stop-opacity="0.45"/>
    </radialGradient>

    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7da3ff"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
    </marker>
  </defs>

  <rect width="1400" height="1000" fill="#0a0d14"/>
  <rect width="1400" height="1000" fill="url(#grid)" opacity="0.6"/>

  <!-- ====== HEADER ====== -->
  <text x="40" y="50" font-size="24" font-weight="700" fill="#ecf0f6">Liquid Canvas — visual model</text>
  <text x="40" y="76" font-size="13" fill="#8b95a7">Regions hold goals. Streams carry causality. Chambers carry content. Density = how well the AI understands.</text>

  <!-- ====== REGION 1: Chemistry exam ====== -->
  <ellipse cx="540" cy="540" rx="495" ry="395" fill="url(#tintBlue)"/>
  <ellipse cx="540" cy="540" rx="495" ry="395" fill="none" stroke="#7da3ff" stroke-opacity="0.18" stroke-dasharray="6,10"/>

  <text x="55" y="220" font-size="10" fill="#7da3ff" font-weight="700" letter-spacing="2">FOUNDATIONS</text>
  <text x="55" y="236" font-size="10" fill="#8b95a7" font-style="italic">what this rests on</text>

  <!-- Foundation 1: Stoichiometry — sketchy -->
  <g>
    <ellipse cx="340" cy="240" rx="95" ry="36" fill="#141b27" stroke="#f59e0b" stroke-opacity="0.75" stroke-width="1.5"/>
    <text x="340" y="237" text-anchor="middle" font-size="13" font-weight="500" fill="#ecf0f6">Stoichiometry</text>
    <text x="340" y="253" text-anchor="middle" font-size="10" fill="#f59e0b">▲ shaky</text>
  </g>

  <!-- Foundation 2: Acids/bases — rich -->
  <g filter="url(#glow)">
    <ellipse cx="540" cy="200" rx="95" ry="36" fill="#1a2233" stroke="#4ade80" stroke-width="2"/>
    <text x="540" y="197" text-anchor="middle" font-size="13" font-weight="500" fill="#ecf0f6">Acids/bases</text>
    <text x="540" y="213" text-anchor="middle" font-size="10" fill="#4ade80">● solid</text>
  </g>

  <!-- Foundation 3: Lab notation — FOG (AI digging here) -->
  <circle cx="730" cy="170" r="92" fill="url(#aiProbe)" opacity="0.6"/>
  <g>
    <ellipse cx="730" cy="170" rx="120" ry="72" fill="url(#fog)"/>
    <ellipse cx="730" cy="170" rx="92" ry="34" fill="none" stroke="#8b95a7" stroke-opacity="0.5" stroke-dasharray="3,4"/>
    <text x="730" y="167" text-anchor="middle" font-size="13" font-weight="500" fill="#aab3c4">Lab notation</text>
    <text x="730" y="184" text-anchor="middle" font-size="14" fill="#8b95a7">??</text>
  </g>
  <text x="730" y="266" text-anchor="middle" font-size="10" fill="#7da3ff" font-style="italic">AI: "what notation is your prof using?"</text>

  <!-- Streams from foundations to goal -->
  <path d="M 340 276 Q 380 360 470 460" fill="none" stroke="#f59e0b" stroke-opacity="0.55" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowAmber)"/>
  <path d="M 540 236 C 540 320 540 380 540 450" fill="none" stroke="#4ade80" stroke-opacity="0.8" stroke-width="5" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M 705 215 Q 670 320 610 460" fill="none" stroke="#8b95a7" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="3,4" stroke-linecap="round"/>

  <!-- GOAL -->
  <g filter="url(#glow)">
    <ellipse cx="540" cy="500" rx="175" ry="62" fill="#1a2233" stroke="#7da3ff" stroke-width="2.5"/>
    <text x="540" y="498" text-anchor="middle" font-size="17" font-weight="700" fill="#ecf0f6">Chemistry exam Friday</text>
    <text x="540" y="520" text-anchor="middle" font-size="10" font-weight="600" fill="#7da3ff" letter-spacing="2">GOAL · centerpiece</text>
  </g>

  <text x="55" y="500" font-size="10" fill="#7da3ff" font-weight="700" letter-spacing="2">GOAL</text>
  <text x="55" y="516" font-size="10" fill="#8b95a7" font-style="italic">anchors its region</text>

  <!-- Context satellites -->
  <g>
    <rect x="170" y="490" width="125" height="32" rx="16" fill="#141b27" stroke="#232c42"/>
    <text x="233" y="510" text-anchor="middle" font-size="11" fill="#aab3c4">Sam — in class</text>
  </g>
  <line x1="295" y1="506" x2="365" y2="506" stroke="#232c42" stroke-dasharray="2,3"/>

  <g>
    <rect x="790" y="490" width="100" height="32" rx="16" fill="#141b27" stroke="#232c42"/>
    <text x="840" y="510" text-anchor="middle" font-size="11" fill="#aab3c4">Fri 10am</text>
  </g>
  <line x1="715" y1="506" x2="790" y2="506" stroke="#232c42" stroke-dasharray="2,3"/>

  <text x="135" y="468" font-size="9" fill="#8b95a7" font-style="italic">context · satellite</text>

  <text x="55" y="640" font-size="10" fill="#7da3ff" font-weight="700" letter-spacing="2">STEPS</text>
  <text x="55" y="656" font-size="10" fill="#8b95a7" font-style="italic">flow forward in time</text>

  <!-- Stream from goal flowing down -->
  <path d="M 540 562 C 540 600 540 620 540 650" fill="none" stroke="#7da3ff" stroke-opacity="0.85" stroke-width="5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Step 1 -->
  <g>
    <ellipse cx="540" cy="680" rx="140" ry="32" fill="#141b27" stroke="#7da3ff" stroke-width="1.6"/>
    <text x="540" y="677" text-anchor="middle" font-size="12" fill="#ecf0f6" font-weight="500">1 · Re-read week 3 notes</text>
    <text x="540" y="693" text-anchor="middle" font-size="10" fill="#8b95a7">~10 min · easy start</text>
  </g>

  <path d="M 540 712 L 540 750" fill="none" stroke="#7da3ff" stroke-opacity="0.75" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <g>
    <ellipse cx="540" cy="780" rx="160" ry="32" fill="#141b27" stroke="#7da3ff" stroke-width="1.6"/>
    <text x="540" y="777" text-anchor="middle" font-size="12" fill="#ecf0f6" font-weight="500">2 · Practice 5 stoich. problems</text>
    <text x="540" y="793" text-anchor="middle" font-size="10" fill="#8b95a7">~25 min · the hard part</text>
  </g>

  <!-- DELTA -->
  <path d="M 540 812 C 540 840 460 855 400 875" fill="none" stroke="#7da3ff" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M 540 812 C 540 840 620 855 680 875" fill="none" stroke="#7da3ff" stroke-opacity="0.6" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g>
    <ellipse cx="360" cy="900" rx="110" ry="28" fill="#141b27" stroke="#7da3ff" stroke-opacity="0.7" stroke-width="1.5"/>
    <text x="360" y="898" text-anchor="middle" font-size="11" fill="#ecf0f6">3a · Text Sam to study</text>
    <text x="360" y="912" text-anchor="middle" font-size="10" fill="#8b95a7">~2 min</text>
  </g>

  <g>
    <ellipse cx="720" cy="900" rx="110" ry="28" fill="#141b27" stroke="#7da3ff" stroke-opacity="0.7" stroke-width="1.5"/>
    <text x="720" y="898" text-anchor="middle" font-size="11" fill="#ecf0f6">3b · Office hours Thu</text>
    <text x="720" y="912" text-anchor="middle" font-size="10" fill="#8b95a7">~5 min</text>
  </g>

  <text x="540" y="852" text-anchor="middle" font-size="9" fill="#7da3ff" font-style="italic">delta · parallel options</text>

  <!-- ====== REGION 2: Clean apartment ====== -->
  <ellipse cx="1180" cy="540" rx="185" ry="285" fill="url(#tintGreen)"/>
  <ellipse cx="1180" cy="540" rx="185" ry="285" fill="none" stroke="#4ade80" stroke-opacity="0.18" stroke-dasharray="5,8"/>

  <g filter="url(#glow)">
    <ellipse cx="1180" cy="460" rx="125" ry="48" fill="#1a2233" stroke="#4ade80" stroke-width="2"/>
    <text x="1180" y="456" text-anchor="middle" font-size="14" font-weight="700" fill="#ecf0f6">Clean apartment</text>
    <text x="1180" y="475" text-anchor="middle" font-size="10" fill="#4ade80" letter-spacing="1.5">GOAL · Saturday</text>
  </g>

  <path d="M 1180 508 L 1180 545" fill="none" stroke="#4ade80" stroke-opacity="0.75" stroke-width="4" marker-end="url(#arrowGreen)"/>

  <g>
    <ellipse cx="1180" cy="572" rx="105" ry="26" fill="#141b27" stroke="#4ade80" stroke-width="1.4"/>
    <text x="1180" y="575" text-anchor="middle" font-size="11" fill="#ecf0f6">1 · Dishes first</text>
  </g>

  <path d="M 1180 598 L 1180 632" fill="none" stroke="#4ade80" stroke-opacity="0.65" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <g>
    <ellipse cx="1180" cy="658" rx="105" ry="26" fill="#141b27" stroke="#4ade80" stroke-width="1.4"/>
    <text x="1180" y="661" text-anchor="middle" font-size="11" fill="#ecf0f6">2 · Bathroom</text>
  </g>

  <path d="M 1180 684 L 1180 715" fill="none" stroke="#4ade80" stroke-opacity="0.6" stroke-width="3" marker-end="url(#arrowGreen)"/>

  <g>
    <ellipse cx="1180" cy="740" rx="110" ry="26" fill="#141b27" stroke="#4ade80" stroke-width="1.4"/>
    <text x="1180" y="743" text-anchor="middle" font-size="11" fill="#ecf0f6">3 · Vacuum + trash</text>
  </g>

  <!-- ====== CROSS-CURRENT between regions ====== -->
  <path d="M 840 506 C 950 480 1040 470 1090 460"
        fill="none" stroke="#ec4899" stroke-opacity="0.55"
        stroke-width="1.5" stroke-dasharray="3,5"/>

  <g>
    <rect x="900" y="408" width="170" height="26" rx="13" fill="#0a0d14" stroke="#ec4899" stroke-opacity="0.7" stroke-width="1"/>
    <text x="985" y="425" text-anchor="middle" font-size="10" fill="#ec4899">shared weekend · time pressure</text>
  </g>
  <text x="985" y="396" text-anchor="middle" font-size="9" fill="#ec4899" font-style="italic">cross-current · AI discovered this</text>

  <!-- ====== LEGEND ====== -->
  <g transform="translate(40, 940)">
    <text x="0" y="0" font-size="10" fill="#7da3ff" font-weight="700" letter-spacing="2">DENSITY · AI'S UNDERSTANDING</text>
    <ellipse cx="32" cy="30" rx="22" ry="11" fill="url(#fog)"/>
    <text x="62" y="34" font-size="11" fill="#aab3c4">fog · unknown</text>
    <ellipse cx="200" cy="30" rx="22" ry="11" fill="#141b27" stroke="#f59e0b" stroke-opacity="0.6"/>
    <text x="230" y="34" font-size="11" fill="#aab3c4">sketchy</text>
    <ellipse cx="340" cy="30" rx="22" ry="11" fill="#1a2233" stroke="#4ade80" stroke-width="1.5" filter="url(#glow)"/>
    <text x="372" y="34" font-size="11" fill="#aab3c4">rich · saturated</text>
  </g>

  <g transform="translate(560, 940)">
    <text x="0" y="0" font-size="10" fill="#7da3ff" font-weight="700" letter-spacing="2">FLOW · CHAIN REACTIONS</text>
    <line x1="0" y1="30" x2="60" y2="30" stroke="#7da3ff" stroke-width="5" stroke-linecap="round"/>
    <text x="68" y="34" font-size="11" fill="#aab3c4">thick · important</text>
    <line x1="180" y1="30" x2="240" y2="30" stroke="#7da3ff" stroke-width="2" stroke-dasharray="3,4" stroke-linecap="round"/>
    <text x="250" y="34" font-size="11" fill="#aab3c4">dashed · guessed</text>
    <line x1="360" y1="30" x2="420" y2="30" stroke="#ec4899" stroke-width="1.5" stroke-dasharray="3,5"/>
    <text x="430" y="34" font-size="11" fill="#aab3c4">pink · cross-current</text>
  </g>

  <text x="700" y="994" text-anchor="middle" font-size="11" fill="#6a7689" font-style="italic">
    The AI lifts the fog, refines the chambers, surfaces cross-currents. The canvas reflows as it learns.
  </text>
</svg>
